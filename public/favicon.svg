<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Cosmos Atlas placeholder mark — concentric rings with a glowing centre.
       Per cosmos-philosophy.md, framework defaults are a brand violation. This is the
       atlas's own atmospheric mark (Deep Cosmos palette). A purpose-built mark is a
       Phase 4b task for whoever owns logo design for the cosmos. -->
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD89A"/>
      <stop offset="40%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FFB347" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" fill="#02030E" rx="10"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#F2EDE3" stroke-opacity="0.18" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#F2EDE3" stroke-opacity="0.28" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="10" fill="url(#sunGrad)"/>
  <circle cx="32" cy="32" r="3" fill="#FFD89A"/>
  <!-- Two planets sitting on the rings -->
  <circle cx="48" cy="22" r="1.8" fill="#A5B4FC"/>
  <circle cx="20" cy="42" r="1.5" fill="#67E8F9"/>
</svg>
